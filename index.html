<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach · Pricing Proposal Template</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #2D2342; --cream: #f8f7fc; --accent: #5951FF;
    --accent-light: #a29bfe; --muted: #6b6b7b; --border: #e2e0f0;
    --save-green: #00b894; --editor-bg: #1e1830;
  }
  body { background: var(--editor-bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; min-height: 100vh; }

  /* EDITOR */
  .editor-wrap { background: #232136; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 28px 40px; }
  .editor-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .editor-title::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .editor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .editor-grid-wide { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .field input, .field select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; color: #fff; outline: none; width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: #232136; color: #fff; }
  .section-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 16px 0; }
  .editor-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 12px; }
  .line-item-editor { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 36px; gap: 8px; align-items: end; margin-bottom: 8px; }
  .line-item-editor .field label { font-size: 9px; }
  .remove-btn { background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.2); border-radius: 8px; color: #ff6b6b; cursor: pointer; font-size: 16px; height: 36px; width: 36px; display: flex; align-items: center; justify-content: center; }
  .remove-btn:hover { background: rgba(255,80,80,0.3); }
  .add-item-btn { background: rgba(89,81,255,0.12); border: 1px dashed rgba(89,81,255,0.35); border-radius: 8px; color: var(--accent-light); cursor: pointer; font-size: 12px; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-weight: 500; padding: 8px 16px; margin-top: 4px; }
  .add-item-btn:hover { background: rgba(89,81,255,0.22); }
  .update-btn { background: var(--accent); border: none; border-radius: 10px; color: #fff; cursor: pointer; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 13px; font-weight: 600; padding: 11px 28px; margin-top: 16px; letter-spacing: 0.02em; }
  .update-btn:hover { background: #4840e0; }

  /* SCREENSHOT HINT BAR */
  .screenshot-bar { background: #2d2b4e; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 13px 40px; display: flex; align-items: center; gap: 12px; }
  .screenshot-bar .hint-icon { font-size: 18px; }
  .screenshot-bar .hint-text { font-size: 13px; color: rgba(255,255,255,0.6); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  .screenshot-bar .hint-text strong { color: #a29bfe; }
  .screenshot-bar .hint-shortcut { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 3px 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; color: rgba(255,255,255,0.7); margin-left: 4px; }

  /* PREVIEW */
  .preview-wrap { padding: 40px 20px; display: flex; justify-content: center; }

  /* SLIDE */
  .slide { width: 1100px; background: var(--cream); border-radius: 24px; overflow: hidden; box-shadow: 0 40px 120px rgba(0,0,0,0.5); animation: fadeUp 0.7s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  /* HEADER */
  .header { background: var(--ink); padding: 0; position: relative; overflow: hidden; }
  .header::before { content: ""; position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(89,81,255,0.4) 0%, transparent 70%); }
  .header-table { width: 100%; border-collapse: collapse; }
  .header-table td { padding: 36px 48px; vertical-align: middle; }
  .header-table td.hdr-center { text-align: center; width: 220px; padding: 36px 16px; }
  .header-table td.hdr-right { text-align: right; }
  .eyebrow { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; letter-spacing: 0.2em; color: #a29bfe; text-transform: uppercase; margin-bottom: 10px; }
  .header h1 { font-size: 38px; font-weight: 900; color: #fff; line-height: 1.1; }
  .header h1 span { color: #a29bfe; }
  .total-label { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .total-amount { font-size: 44px; font-weight: 700; color: #fff; line-height: 1; }
  .total-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
  .prepby-label { font-size: 9px; color: rgba(255,255,255,0.3); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .prepby-name { font-size: 12px; color: rgba(255,255,255,0.7); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.9; }

  /* BANNER */
  .savings-banner { background: var(--save-green); padding: 13px 48px; font-size: 13px; font-weight: 600; color: #fff; }

  /* BODY */
  .body { display: grid; grid-template-columns: 1fr 320px; gap: 0; }
  .body-left { padding: 36px 48px; }
  .body-right { padding: 32px 32px 32px 0; display: flex; flex-direction: column; gap: 16px; }

  /* LINE ITEMS */
  .grp-tag { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; margin-bottom: 8px; }
  .grp-core { background: rgba(89,81,255,0.12); color: #5951FF; }
  .grp-addon { background: rgba(89,81,255,0.08); color: #7c6fff; }
  .grp-ai { background: rgba(0,184,148,0.12); color: #00b894; }
  .item { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 11px 14px; border-radius: 10px; margin-bottom: 4px; }
  .item:hover { background: rgba(89,81,255,0.04); }
  .item-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .item-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .item-seats { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; color: var(--muted); text-align: right; white-space: nowrap; }
  .item-cost { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); text-align: right; min-width: 90px; white-space: nowrap; }
  .ai-item { background: rgba(0,184,148,0.06); border: 1px solid rgba(0,184,148,0.2); }
  .ai-item:hover { background: rgba(0,184,148,0.1); }
  .strike { text-decoration: line-through; color: #bbb; font-size: 11px; margin-right: 3px; }
  .grp-divider { border: none; border-top: 1px dashed var(--border); margin: 4px 0 16px; }
  .item-group { margin-bottom: 16px; }

  /* DEAL TERMS */
  .terms-box { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-top: 14px; }
  .terms-lbl { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .term-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .term-row:nth-child(odd) { padding-right: 20px; }
  .term-row:nth-child(even) { padding-left: 20px; border-left: 1px solid var(--border); }
  .term-row:nth-last-child(-n+2) { border-bottom: none; }
  .tk { color: var(--muted); }
  .tv { font-weight: 600; color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; }
  .badge { display: inline-block; background: rgba(89,81,255,0.1); color: #5951FF; padding: 2px 8px; border-radius: 6px; }
  .pricing-note { background: rgba(89,81,255,0.07); border-left: 3px solid #5951FF; border-radius: 0 8px 8px 0; padding: 12px 14px; font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 10px; }

  /* RIGHT PANEL */
  .savings-card { background: var(--ink); border-radius: 14px; padding: 22px; color: #fff; position: relative; overflow: hidden; }
  .savings-card::after { content: ""; position: absolute; bottom: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(89,81,255,0.45) 0%, transparent 70%); }
  .card-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
  .sav-big { font-size: 44px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .sav-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
  .sav-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0; }
  .sav-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .sav-row span:first-child { color: rgba(255,255,255,0.5); }
  .sav-row span:last-child { color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .why-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; flex: 1; }
  .why-card .card-label { color: var(--muted); }
  .why-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .why-row:last-child { margin-bottom: 0; }
  .why-ico { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .why-ico-a { background: rgba(89,81,255,0.1); }
  .why-ico-b { background: rgba(0,184,148,0.1); }
  .why-title { font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .why-body { font-size: 11px; color: var(--muted); line-height: 1.4; }

  /* FOOTER */
  .footer { border-top: 1px solid var(--border); padding: 16px 48px; display: flex; justify-content: space-between; align-items: center; background: var(--cream); }
  .footer-left { font-size: 12px; color: var(--muted); }
  .footer-left strong { color: var(--ink); }
</style>
</head>
<body>

<!-- EDITOR -->
<div class="editor-wrap">
  <div class="editor-title">Outreach Pricing Proposal · Template Editor</div>
  <div class="editor-section-label">Deal Info</div>
  <div class="editor-grid">
    <div class="field"><label>Customer Name</label><input type="text" id="customerName" value="Culture Amp"></div>
    <div class="field"><label>Proposal Type</label><select id="proposalType"><option value="Renewal">Renewal</option><option value="New Business">New Business</option><option value="Expansion">Expansion</option><option value="Upsell">Upsell</option></select></div>
    <div class="field"><label>Term Length</label><select id="termLength"><option value="12-Month Term">12-Month Term</option><option value="24-Month Term" selected>24-Month Term</option><option value="36-Month Term">36-Month Term</option></select></div>
    <div class="field"><label>Year</label><input type="text" id="proposalYear" value="2026"></div>
  </div>
  <div class="editor-grid">
    <div class="field"><label>Renewal / Close Date</label><input type="text" id="renewalDate" value="Apr 24, 2026"></div>
    <div class="field"><label>Billing</label><select id="billing"><option value="Annual" selected>Annual</option><option value="Monthly">Monthly</option><option value="Quarterly">Quarterly</option></select></div>
    <div class="field"><label>Payment Terms</label><select id="paymentTerms"><option value="Net 30">Net 30</option><option value="Net 60" selected>Net 60</option><option value="Net 90">Net 90</option></select></div>
    <div class="field"><label>Sold To</label><input type="text" id="soldTo" value="James Watson"></div>
  </div>
  <div class="editor-grid">
    <div class="field" style="grid-column:span 2;"><label>Prepared For (footer)</label><input type="text" id="preparedFor" value="Culture Amp"></div>
    <div class="field" style="grid-column:span 2;"><label>Prepared By (use · between names)</label><input type="text" id="preparedBy" value="Kyle · Emma (CSM)"></div>
  </div>
  <hr class="section-divider">
  <div class="editor-section-label">Savings & Uplift</div>
  <div class="editor-grid">
    <div class="field"><label>Savings Line 1 Label</label><input type="text" id="savingsLabel1" value="Amplify credit discount"></div>
    <div class="field"><label>Savings Line 1 Amount</label><input type="text" id="savingsAmt1" value="$37,500"></div>
    <div class="field"><label>Savings Line 2 Label</label><input type="text" id="savingsLabel2" value="Uplift reduction (7% → 4%)"></div>
    <div class="field"><label>Savings Line 2 Amount</label><input type="text" id="savingsAmt2" value="$5,485"></div>
  </div>
  <div class="editor-grid-wide">
    <div class="field"><label>Banner Highlight (green bar)</label><input type="text" id="bannerText" value="You're saving $37,500 on Amplify AI Agent credits — locked in at $0.40/credit vs. list price of $0.60"></div>
    <div class="field"><label>Pricing Note</label><input type="text" id="upliftNote" value="4% uplift applied at renewal — reduced from the standard 7% in exchange for a 24-month commitment and Amplify expansion."></div>
    <div class="field"><label>Bill To</label><input type="text" id="billTo" value="Culture Amp Accounts"></div>
  </div>
  <hr class="section-divider">
  <div class="editor-section-label">Right Panel Card</div>
  <div class="editor-grid"><div class="field" style="grid-column:span 4;"><label>Card Header</label><input type="text" id="whyHeader" value="Why Act Now"></div></div>
  <div class="editor-grid">
    <div class="field"><label>Row 1 Icon</label><input type="text" id="row1Icon" value="📅"></div>
    <div class="field"><label>Row 1 Title</label><input type="text" id="row1Title" value="Renewal date is April 24"></div>
    <div class="field" style="grid-column:span 2;"><label>Row 1 Body</label><input type="text" id="row1Body" value="A lapse resets pricing to current list rates — locking in today protects seat pricing and any negotiated discounts."></div>
  </div>
  <div class="editor-grid">
    <div class="field"><label>Row 2 Icon</label><input type="text" id="row2Icon" value="⚡"></div>
    <div class="field"><label>Row 2 Title</label><input type="text" id="row2Title" value="Amplify pricing is early-adopter"></div>
    <div class="field" style="grid-column:span 2;"><label>Row 2 Body</label><input type="text" id="row2Body" value="$0.40/credit is an introductory rate. The 24-month term locks this in before pricing matures."></div>
  </div>
  <div class="editor-grid">
    <div class="field"><label>Row 3 Icon</label><input type="text" id="row3Icon" value="🏆"></div>
    <div class="field"><label>Row 3 Title</label><input type="text" id="row3Title" value="Proven ROI at Culture Amp"></div>
    <div class="field" style="grid-column:span 2;"><label>Row 3 Body</label><input type="text" id="row3Body" value="Your team has already seen measurable impact — this renewal locks in continuity and expands that foundation with AI."></div>
  </div>
  <div class="editor-grid">
    <div class="field"><label>Row 4 Icon</label><input type="text" id="row4Icon" value="🤝"></div>
    <div class="field"><label>Row 4 Title</label><input type="text" id="row4Title" value="Dedicated support included"></div>
    <div class="field" style="grid-column:span 2;"><label>Row 4 Body</label><input type="text" id="row4Body" value="Support Plus ensures your team has a dedicated resource for onboarding, troubleshooting, and maximizing adoption."></div>
  </div>
  <hr class="section-divider">
  <div class="editor-section-label">Line Items</div>
  <div id="lineItemsEditor"></div>
  <button class="add-item-btn" onclick="addLineItem()">+ Add Line Item</button>
  <br>
  <button class="update-btn" onclick="renderSlide()">↻ Update Preview</button>
</div>

<!-- SCREENSHOT HINT -->
<div class="screenshot-bar">
  <span class="hint-icon">📸</span>
  <span class="hint-text">
    When your proposal is ready, take a screenshot of the slide below to save or share it.
    <strong>Mac:</strong> <span class="hint-shortcut">⌘ Shift 4</span> then drag to select &nbsp;·&nbsp;
    <strong>Windows:</strong> <span class="hint-shortcut">Win Shift S</span> then drag to select
  </span>
</div>

<!-- PREVIEW -->
<div class="preview-wrap">
  <div class="slide" id="slide"></div>
</div>

<script>
  const lineItems = [
    {name:"Engage Seats",detail:"Full platform access per rep",seats:"215 seats",rate:"$63.74/mo",total:164453,group:"core",strikeRate:""},
    {name:"Admin Seats",detail:"Platform administration",seats:"20 seats",rate:"$26/mo",total:6240,group:"core",strikeRate:""},
    {name:"Voice: Global Calling",detail:"Unlimited global outbound",seats:"1 license",rate:"$300/mo",total:3600,group:"addon",strikeRate:""},
    {name:"Outreach Support: Plus",detail:"Priority support & CSM access",seats:"1 license",rate:"$711/mo",total:8535,group:"addon",strikeRate:""},
    {name:"Amplify AI Agent Credits",detail:"Autonomous prospecting & outreach execution",seats:"250,000 credits",rate:"$0.40",total:100000,group:"ai",strikeRate:"$0.60"},
  ];

  function fmt(n){return "$"+Number(n).toLocaleString("en-US");}

  function buildEditor(){
    const wrap=document.getElementById("lineItemsEditor");
    wrap.innerHTML="";
    lineItems.forEach((item,i)=>{
      wrap.innerHTML+=`<div class="line-item-editor">
        <div class="field"><label>Name | Detail</label><input type="text" value="${item.name}|${item.detail}" onchange="updateItem(${i},'nameDetail',this.value)"></div>
        <div class="field"><label>Seats / Credits</label><input type="text" value="${item.seats}" onchange="updateItem(${i},'seats',this.value)"></div>
        <div class="field"><label>Rate (strike|new)</label><input type="text" value="${item.strikeRate?item.strikeRate+"|"+item.rate:item.rate}" onchange="updateItem(${i},'rate',this.value)"></div>
        <div class="field"><label>Total ($)</label><input type="number" value="${item.total}" onchange="updateItem(${i},'total',this.value)"></div>
        <div class="field"><label>Group</label><select onchange="updateItem(${i},'group',this.value)">
          <option value="core" ${item.group==="core"?"selected":""}>Core</option>
          <option value="addon" ${item.group==="addon"?"selected":""}>Add-on</option>
          <option value="ai" ${item.group==="ai"?"selected":""}>AI</option>
        </select></div>
        <button class="remove-btn" onclick="removeItem(${i})">×</button>
      </div>`;
    });
  }

  function updateItem(i,field,val){
    if(field==="nameDetail"){const p=val.split("|");lineItems[i].name=p[0]||val;lineItems[i].detail=p[1]||"";}
    else if(field==="rate"){const p=val.split("|");if(p.length===2){lineItems[i].strikeRate=p[0];lineItems[i].rate=p[1];}else{lineItems[i].strikeRate="";lineItems[i].rate=val;}}
    else if(field==="total"){lineItems[i].total=parseFloat(val)||0;}
    else{lineItems[i][field]=val;}
  }
  function removeItem(i){lineItems.splice(i,1);buildEditor();renderSlide();}
  function addLineItem(){lineItems.push({name:"New Item",detail:"Description",seats:"1",rate:"$0/mo",total:0,group:"addon",strikeRate:""});buildEditor();renderSlide();}

  function renderSlide(){
    const customer    = document.getElementById("customerName").value||"Customer";
    const type        = document.getElementById("proposalType").value;
    const term        = document.getElementById("termLength").value;
    const year        = document.getElementById("proposalYear").value;
    const renewalDate = document.getElementById("renewalDate").value;
    const billing     = document.getElementById("billing").value;
    const paymentTerms= document.getElementById("paymentTerms").value;
    const soldTo      = document.getElementById("soldTo").value;
    const billTo      = document.getElementById("billTo").value;
    const preparedFor = document.getElementById("preparedFor").value||customer;
    const preparedBy  = document.getElementById("preparedBy").value||"";
    const bannerText  = document.getElementById("bannerText").value;
    const upliftNote  = document.getElementById("upliftNote").value;
    const sl1 = document.getElementById("savingsLabel1").value;
    const sa1 = document.getElementById("savingsAmt1").value;
    const sl2 = document.getElementById("savingsLabel2").value;
    const sa2 = document.getElementById("savingsAmt2").value;
    const whyHeader   = document.getElementById("whyHeader").value||"Why Act Now";
    const rows = [
      [document.getElementById("row1Icon").value, document.getElementById("row1Title").value, document.getElementById("row1Body").value],
      [document.getElementById("row2Icon").value, document.getElementById("row2Title").value, document.getElementById("row2Body").value],
      [document.getElementById("row3Icon").value, document.getElementById("row3Title").value, document.getElementById("row3Body").value],
      [document.getElementById("row4Icon").value, document.getElementById("row4Title").value, document.getElementById("row4Body").value],
    ].filter(r=>r[1]||r[2]);

    const grandTotal = lineItems.reduce((s,i)=>s+Number(i.total),0);
    const s1=parseFloat(sa1.replace(/[$,]/g,""))||0;
    const s2=parseFloat(sa2.replace(/[$,]/g,""))||0;
    const totalSavings=fmt(s1+s2);
    const termDisplay={"12-Month Term":"12 Months","24-Month Term":"24 Months","36-Month Term":"36 Months"}[term]||term;

    const groups={core:{label:"Core Platform",cls:"grp-core",items:[]},addon:{label:"Add-ons",cls:"grp-addon",items:[]},ai:{label:"AI Agents",cls:"grp-ai",items:[]}};
    lineItems.forEach(item=>{
      const g=groups[item.group]||groups.addon;
      const rateHtml=item.strikeRate?`<span class="strike">${item.strikeRate}</span>${item.rate}`:item.rate;
      const isAi=item.group==="ai";
      g.items.push(`<div class="item ${isAi?"ai-item":""}">
        <div><div class="item-name">${item.name}</div><div class="item-detail">${item.detail}</div></div>
        <div class="item-seats">${item.seats} · ${rateHtml}</div>
        <div class="item-cost">${fmt(item.total)}</div>
      </div>`);
    });

    const activeGroups=Object.values(groups).filter(g=>g.items.length>0);
    const groupsHtml=activeGroups.map((g,idx)=>`
      <div class="item-group">
        <span class="grp-tag ${g.cls}">${g.label}</span>
        ${g.items.join("")}
      </div>
      ${idx<activeGroups.length-1?"<hr class=\"grp-divider\">":""}`).join("");

    const prepByHtml=preparedBy?`
      <div class="prepby-label">Prepared by</div>
      <div class="prepby-name">${preparedBy.split("·").map(n=>n.trim()).join("<br>")}</div>`:"";

    const whyRowsHtml=rows.map(([icon,title,body],i)=>`
      <div class="why-row">
        <div class="why-ico ${i%2===0?"why-ico-a":"why-ico-b"}">${icon}</div>
        <div><div class="why-title">${title}</div><div class="why-body">${body}</div></div>
      </div>`).join("");

    document.getElementById("slide").innerHTML=`
      <div class="header">
        <table class="header-table" cellpadding="0" cellspacing="0"><tr>
          <td><div class="eyebrow">${type} Proposal · ${term}</div><h1>${customer}'s<br><span>${type} ${year}</span></h1></td>
          <td class="hdr-center">${prepByHtml}</td>
          <td class="hdr-right"><div class="total-label">Total Annual Investment</div><div class="total-amount">${fmt(grandTotal)}</div><div class="total-sub">billed ${billing.toLowerCase()} · ${paymentTerms.toLowerCase()}</div></td>
        </tr></table>
      </div>
      <div class="savings-banner">✦ &nbsp;${bannerText}</div>
      <div class="body">
        <div class="body-left">
          ${groupsHtml}
          <div class="terms-box">
            <div class="terms-lbl">Deal Terms</div>
            <div class="terms-grid">
              <div class="term-row"><span class="tk">${type} Date</span><span class="tv badge">${renewalDate}</span></div>
              <div class="term-row"><span class="tk">Billing</span><span class="tv">${billing}</span></div>
              <div class="term-row"><span class="tk">Term Length</span><span class="tv">${termDisplay}</span></div>
              <div class="term-row"><span class="tk">Payment Terms</span><span class="tv">${paymentTerms}</span></div>
              <div class="term-row"><span class="tk">Sold To</span><span class="tv">${soldTo}</span></div>
              <div class="term-row"><span class="tk">Bill To</span><span class="tv">${billTo}</span></div>
            </div>
          </div>
          <div class="pricing-note">${upliftNote}</div>
        </div>
        <div class="body-right">
          <div class="savings-card">
            <div class="card-label">Total savings this ${type.toLowerCase()}</div>
            <div class="sav-big">${totalSavings}</div>
            <div class="sav-sub">vs. standard pricing &amp; list rates</div>
            <hr class="sav-divider">
            <div class="sav-row"><span>${sl1}</span><span>${sa1}</span></div>
            <div class="sav-row"><span>${sl2}</span><span>${sa2}</span></div>
          </div>
          <div class="why-card">
            <div class="card-label">${whyHeader}</div>
            ${whyRowsHtml}
          </div>
        </div>
      </div>
      <div class="footer">
        <div class="footer-left">Prepared for <strong>${preparedFor}</strong></div>
        <div style="font-size:18px;font-weight:700;color:#5951FF;letter-spacing:-0.5px;">outreach</div>
      </div>`;
  }

  buildEditor();
  renderSlide();
</script>
</body>
</html>
